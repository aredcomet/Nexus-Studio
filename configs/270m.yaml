# Model and Data
model: "./models/gemma-3-270m-it"
train: true
data: "./data/mlx_data"

# LoRA Parameters
lora_parameters:
  # Use exact relative names as found in Gemma 3
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 32 # Keep rank 32 for logic capacity
  alpha: 64
  scale: 2.0
  dropout: 0.1

# Training Hyperparameters
batch_size: 1
iters: 1000 # Increased for larger, higher-quality GretelAI dataset
grad_accumulation_steps: 4
learning_rate: 1e-5
max_seq_length: 4096
grad_checkpoint: true

# Layer configuration
num_layers: 16

# Reporting and Saving
steps_per_report: 10
steps_per_eval: 50
save_every: 100
adapter_path: "adapters/270m"
mask_prompt: true
